# WebSocket upgrade, conditionally. A blanket `Connection: upgrade` would break keepalive on
# ordinary REST requests; this sends `close` unless the client actually asked to upgrade, which
# is what lets one /api/ rule carry both the JSON API and the SignalR socket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unmatched paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend (same-origin, so the httpOnly cookie works).
    # Trailing slashes strip the /api prefix: /api/auth/login -> backend /auth/login.
    #
    # The SignalR hub rides this rule too: /api/hubs/board -> backend /hubs/board, which is
    # what its query-string token check keys off. Same-origin, so no CORS (ADR-11).
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket handshake for the hub (no-ops for ordinary requests via the map above).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # A hub connection is long-lived; the 60s default would cut it every minute.
        proxy_read_timeout 1h;
    }
}
