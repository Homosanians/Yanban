name: yanban

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yanban
      POSTGRES_USER: yanban
      POSTGRES_PASSWORD: yanban_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yanban -d yanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Yanban.API/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=yanban;Username=yanban;Password=yanban_dev_password"
      Jwt__Secret: "dev-only-change-me-super-secret-signing-key-min-32-bytes-long"
      Jwt__Issuer: "yanban"
      Jwt__Audience: "yanban"
      # The API reaches MinIO at the in-network host `minio`, and that host is baked into
      # the presigned URLs it issues — so a browser on your machine cannot follow them
      # (it would need `localhost:9000`). This "split-horizon" case is a documented
      # known-limitation (README ADR-10). For attachment work run the API on the host
      # (`dotnet run`) against `docker compose up -d postgres minio`, where both sides
      # use `localhost:9000` and presigned URLs just work.
      S3__Endpoint: "http://minio:9000"
      S3__AccessKey: "minioadmin"
      S3__SecretKey: "minioadmin"
      S3__Bucket: "yanban-attachments"
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
